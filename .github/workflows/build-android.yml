name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'

    - name: Setup Java JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Install Dependensi
      run: npm install > build_log.txt 2>&1

    - name: Build React Web App
      run: npm run build >> build_log.txt 2>&1

    - name: Sync ke Capacitor Android
      run: npx @capacitor/cli sync android >> build_log.txt 2>&1

    - name: Build APK menggunakan Gradle
      working-directory: ./android
      run: |
        sed -i 's/\r$//' gradlew >> ../build_log.txt 2>&1
        chmod +x ./gradlew >> ../build_log.txt 2>&1
        ./gradlew assembleDebug >> ../build_log.txt 2>&1

    - name: Upload Debug Log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: Build-Logs
        path: build_log.txt

    - name: Upload APK ke GitHub
      uses: actions/upload-artifact@v4
      with:
        name: Silat-Merpati-Putih.apk
        path: android/app/build/outputs/apk/debug/app-debug.apk

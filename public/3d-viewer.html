<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>3D Viewer</title>
  <style>
    body, html { 
      margin: 0; 
      padding: 0; 
      width: 100%; 
      height: 100%; 
      background-color: #0f172a; /* slate-900 */
      overflow: hidden; 
    }
    canvas { 
      width: 100%; 
      height: 100%; 
      display: block; 
      touch-action: none;
      cursor: grab;
    }
    canvas:active {
      cursor: grabbing;
    }
    #loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-family: sans-serif;
      font-size: 14px;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <canvas id="canvas3d"></canvas>
  <script src="/3d/copperlichtdata/copperlicht.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const file = params.get('file');
    
    if (file && window.startCopperLichtFromFile) {
      // Initialize Copperlicht
      window.startCopperLichtFromFile('canvas3d', '/3d/copperlichtdata/' + file, 'Memuat Animasi...', 'Error: Browser tidak mendukung WebGL.');
    }
  </script>
</body>
</html>
